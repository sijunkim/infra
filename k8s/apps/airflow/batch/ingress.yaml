apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: airflow-ingress
  namespace: airflow
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`airflow.kimsijun.com`)
      kind: Rule
      services:
        - name: airflow-webserver
          port: 8080
  tls:
    certResolver: letsencrypt
