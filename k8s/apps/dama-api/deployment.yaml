apiVersion: apps/v1
kind: Deployment
metadata:
  name: dama-api
  namespace: prodesk
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dama-api
  template:
    metadata:
      labels:
        app: dama-api
    spec:
      enableServiceLinks: false
      imagePullSecrets:
        - name: ghcr-pull
      # uploads 볼륨 쓰기 권한(이미지 app uid/gid=10001 과 일치).
      securityContext:
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: dama-uploads
      containers:
        - name: dama-api
          image: ghcr.io/sijunkim/dama-api:master-c374968
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: uploads
              mountPath: /app/uploads
          env:
            - name: JAVA_TOOL_OPTIONS
              value: "-XX:MaxRAMPercentage=75"
            - name: DB_HOST
              value: "mysql"
            - name: DB_PORT
              value: "3306"
            - name: DB_NAME
              value: "dama"
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_PASSWORD
          envFrom:
            - secretRef:
                name: dama-api-secret
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 45
            periodSeconds: 20
