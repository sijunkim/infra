apiVersion: apps/v1
kind: Deployment
metadata:
  name: dama-api
  namespace: prodesk
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dama-api
  template:
    metadata:
      labels:
        app: dama-api
    spec:
      enableServiceLinks: false
      imagePullSecrets:
        - name: ghcr-pull
      # 비루트 실행(이미지 app uid/gid=10001 과 일치). 이미지는 메모리에서만 처리 — 영속 볼륨 없음.
      securityContext:
        runAsUser: 10001
        runAsGroup: 10001
      containers:
        - name: dama-api
          image: ghcr.io/sijunkim/dama-api:master-e9803f5
          ports:
            - containerPort: 8080
          env:
            - name: JAVA_TOOL_OPTIONS
              value: "-XX:MaxRAMPercentage=75"
            - name: DB_HOST
              value: "mysql"
            - name: DB_PORT
              value: "3306"
            - name: DB_NAME
              value: "dama"
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_PASSWORD
            # Redis — refresh 토큰·token_version 저장(폐기). 비번은 기존 공유 redis-secret 재사용(평문 금지).
            - name: REDIS_HOST
              value: "redis"
            - name: REDIS_PORT
              value: "6379"
            - name: REDIS_USERNAME
              value: ""
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-secret
                  key: REDIS_PASSWORD
          envFrom:
            - secretRef:
                name: dama-api-secret
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 45
            periodSeconds: 20
