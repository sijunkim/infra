apiVersion: v1
data:
  dama-analytics.json: |
    {
      "uid": "dama-analytics",
      "title": "Dama 행동 분석",
      "tags": ["dama", "analytics"],
      "timezone": "browser",
      "schemaVersion": 39,
      "version": 4,
      "refresh": "5m",
      "time": { "from": "now-7d", "to": "now" },
      "templating": {
        "list": [
          {
            "name": "session",
            "label": "세션",
            "type": "query",
            "hide": 0,
            "skipUrlSync": false,
            "datasource": { "type": "elasticsearch", "uid": "dama-events" },
            "definition": "{\"find\":\"terms\",\"field\":\"session_id\",\"query\":\"platform:\\\"ios\\\"\",\"size\":200}",
            "query": "{\"find\":\"terms\",\"field\":\"session_id\",\"query\":\"platform:\\\"ios\\\"\",\"size\":200}",
            "refresh": 2,
            "regex": "",
            "sort": 0,
            "multi": false,
            "includeAll": false,
            "current": { "selected": false, "text": "", "value": "" },
            "options": []
          }
        ]
      },
      "annotations": { "list": [] },
      "panels": [
        {
          "id": 1,
          "type": "timeseries",
          "title": "이벤트 추이 (전체)",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "datasource": { "type": "elasticsearch", "uid": "dama-events" },
          "fieldConfig": { "defaults": { "custom": { "drawStyle": "bars", "fillOpacity": 40 } }, "overrides": [] },
          "options": { "legend": { "showLegend": true } },
          "targets": [
            {
              "refId": "A",
              "query": "*",
              "metrics": [ { "id": "1", "type": "count" } ],
              "bucketAggs": [ { "id": "2", "type": "date_histogram", "field": "created_at", "settings": { "interval": "auto" } } ]
            }
          ]
        },
        {
          "id": 2,
          "type": "timeseries",
          "title": "일일 사용자 수 (DAU)",
          "description": "그날 앱을 사용한 고유 사용자(기기) 수예요. 로그인 없이도 기기 단위(익명 id)로 셉니다. 막대 하나 = 그날 사용한 사람 수.",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "datasource": { "type": "elasticsearch", "uid": "dama-events" },
          "fieldConfig": { "defaults": { "custom": { "drawStyle": "bars", "fillOpacity": 40 } }, "overrides": [] },
          "options": { "legend": { "showLegend": false } },
          "targets": [
            {
              "refId": "A",
              "alias": "활성 사용자",
              "query": "*",
              "metrics": [ { "id": "1", "type": "cardinality", "field": "anon_id" } ],
              "bucketAggs": [ { "id": "2", "type": "date_histogram", "field": "created_at", "settings": { "interval": "1d" } } ]
            }
          ]
        },
        {
          "id": 3,
          "type": "table",
          "title": "버튼 클릭 순위",
          "gridPos": { "h": 9, "w": 12, "x": 0, "y": 8 },
          "datasource": { "type": "elasticsearch", "uid": "dama-events" },
          "fieldConfig": { "defaults": {}, "overrides": [] },
          "options": { "showHeader": true },
          "targets": [
            {
              "refId": "A",
              "query": "type:tap",
              "metrics": [ { "id": "1", "type": "count" } ],
              "bucketAggs": [ { "id": "2", "type": "terms", "field": "props.nameLabel", "settings": { "order": "desc", "orderBy": "_count", "size": "50" } } ]
            }
          ]
        },
        {
          "id": 4,
          "type": "table",
          "title": "화면별 평균 체류시간 (ms)",
          "gridPos": { "h": 9, "w": 12, "x": 12, "y": 8 },
          "datasource": { "type": "elasticsearch", "uid": "dama-events" },
          "fieldConfig": { "defaults": {}, "overrides": [] },
          "options": { "showHeader": true },
          "targets": [
            {
              "refId": "A",
              "query": "type:screen_view",
              "metrics": [ { "id": "1", "type": "avg", "field": "duration_ms" } ],
              "bucketAggs": [ { "id": "2", "type": "terms", "field": "props.screenLabel", "settings": { "order": "desc", "orderBy": "1", "size": "50" } } ]
            }
          ]
        },
        {
          "id": 5,
          "type": "table",
          "title": "화면 방문수 순위",
          "gridPos": { "h": 9, "w": 12, "x": 0, "y": 17 },
          "datasource": { "type": "elasticsearch", "uid": "dama-events" },
          "fieldConfig": { "defaults": {}, "overrides": [] },
          "options": { "showHeader": true },
          "targets": [
            {
              "refId": "A",
              "query": "type:screen_view",
              "metrics": [ { "id": "1", "type": "count" } ],
              "bucketAggs": [ { "id": "2", "type": "terms", "field": "props.screenLabel", "settings": { "order": "desc", "orderBy": "_count", "size": "50" } } ]
            }
          ]
        },
        {
          "id": 6,
          "type": "table",
          "title": "세션 이벤트 타임라인",
          "description": "선택한 session_id의 화면 진입과 버튼 클릭을 시간순으로 보여줘요.",
          "gridPos": { "h": 9, "w": 12, "x": 12, "y": 17 },
          "datasource": { "type": "elasticsearch", "uid": "dama-events" },
          "fieldConfig": { "defaults": {}, "overrides": [] },
          "options": { "showHeader": true, "cellHeight": "sm" },
          "targets": [
            {
              "refId": "A",
              "query": "session_id:\"$session\" AND platform:\"ios\" AND (type:\"screen_view\" OR type:\"tap\")",
              "timeField": "occurred_at",
              "bucketAggs": [],
              "metrics": [ { "id": "1", "type": "raw_data", "settings": { "size": "200" } } ]
            }
          ],
          "transformations": [
            {
              "id": "organize",
              "options": {
                "excludeByName": {
                  "@timestamp": true,
                  "_id": true,
                  "_index": true,
                  "_score": true,
                  "created_at": true,
                  "app_version": true,
                  "platform": true
                },
                "indexByName": {
                  "occurred_at": 0,
                  "type": 1,
                  "props.screenLabel": 2,
                  "props.nameLabel": 3,
                  "duration_ms": 4,
                  "screen": 5,
                  "name": 6,
                  "anon_id": 7,
                  "session_id": 8
                },
                "renameByName": {
                  "occurred_at": "시간",
                  "type": "종류",
                  "props.screenLabel": "화면",
                  "props.nameLabel": "행동",
                  "duration_ms": "체류시간(ms)"
                }
              }
            }
          ]
        },
        {
          "id": 7,
          "type": "table",
          "title": "세션 화면 이동",
          "description": "선택한 session_id에서 실제로 본 화면만 시간순으로 보여줘요.",
          "gridPos": { "h": 10, "w": 24, "x": 0, "y": 26 },
          "datasource": { "type": "elasticsearch", "uid": "dama-events" },
          "fieldConfig": { "defaults": {}, "overrides": [] },
          "options": { "showHeader": true, "cellHeight": "sm" },
          "targets": [
            {
              "refId": "A",
              "query": "session_id:\"$session\" AND platform:\"ios\" AND type:\"screen_view\"",
              "timeField": "occurred_at",
              "bucketAggs": [],
              "metrics": [ { "id": "1", "type": "raw_data", "settings": { "size": "100" } } ]
            }
          ],
          "transformations": [
            {
              "id": "organize",
              "options": {
                "excludeByName": {
                  "@timestamp": true,
                  "_id": true,
                  "_index": true,
                  "_score": true,
                  "created_at": true,
                  "app_version": true,
                  "platform": true,
                  "props.nameLabel": true,
                  "screen": true,
                  "name": true,
                  "anon_id": true,
                  "session_id": true
                },
                "indexByName": {
                  "occurred_at": 0,
                  "props.screenLabel": 1,
                  "duration_ms": 2
                },
                "renameByName": {
                  "occurred_at": "시간",
                  "props.screenLabel": "화면",
                  "duration_ms": "체류시간(ms)"
                }
              }
            }
          ]
        }
      ]
    }
kind: ConfigMap
metadata:
  labels:
    grafana_dashboard: "1"
  name: dama-analytics-dashboard
  namespace: monitoring
