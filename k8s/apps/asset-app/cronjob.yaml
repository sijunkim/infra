apiVersion: batch/v1
kind: CronJob
metadata:
  name: asset-app-snapshot
  namespace: prodesk
spec:
  # 매일 00:00 KST (15:00 UTC) — friend-app 패턴 동일
  schedule: "0 15 * * *"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
          - name: snapshot
            image: curlimages/curl:8.10.1
            env:
            - name: ASSETS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: asset-app-secret
                  key: ASSETS_TOKEN
            command:
            - sh
            - -c
            - 'curl -fsS -X POST -H "Authorization: Bearer $ASSETS_TOKEN" http://asset-app:8080/api/snapshot'
