apiVersion: apps/v1
kind: Deployment
metadata:
  name: dama-web
  namespace: prodesk
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dama-web
  template:
    metadata:
      labels:
        app: dama-web
    spec:
      enableServiceLinks: false
      containers:
      - name: dama-web
        image: ghcr.io/sijunkim/dama-web:master-f79038c
        envFrom:
        - configMapRef:
            name: dama-web-config
        ports:
        - containerPort: 3000
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
