apiVersion: apps/v1
kind: Deployment
metadata:
  name: friend-app
  namespace: prodesk
spec:
  replicas: 1
  selector:
    matchLabels:
      app: friend-app
  template:
    metadata:
      labels:
        app: friend-app
    spec:
      enableServiceLinks: false
      containers:
      - name: friend-app
        image: ghcr.io/sijunkim/friend-app:master-placeholder
        ports:
        - containerPort: 3000
        envFrom:
        - secretRef:
            name: friend-app-secret
        env:
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: redis-secret
              key: REDIS_PASSWORD
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
