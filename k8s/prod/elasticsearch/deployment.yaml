apiVersion: apps/v1
kind: Deployment
metadata:
  name: elasticsearch
  namespace: dama-prod
spec:
  # 단일 노드 — local-path PVC(RWO)라 동시 마운트 불가 → Recreate.
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: elasticsearch
  template:
    metadata:
      labels:
        app: elasticsearch
    spec:
      # 데이터 디렉터리 소유자를 ES 컨테이너 uid(1000)로 보정(local-path 초기 권한).
      initContainers:
      - name: fix-permissions
        image: busybox
        command: ["sh", "-c", "chown -R 1000:1000 /usr/share/elasticsearch/data"]
        volumeMounts:
        - name: es-data
          mountPath: /usr/share/elasticsearch/data
      containers:
      - name: elasticsearch
        # 고정 버전(image-updater 대상 아님). 클러스터 내부 전용 — security off.
        image: docker.elastic.co/elasticsearch/elasticsearch:8.8.2
        env:
        - name: node.name
          value: elasticsearch
        - name: discovery.type
          value: single-node
        - name: bootstrap.memory_lock
          value: "true"
        - name: xpack.security.enabled
          value: "false"
        - name: xpack.security.transport.ssl.enabled
          value: "false"
        - name: ES_JAVA_OPTS
          value: -Xms1g -Xmx1g
        - name: ES_TMPDIR
          value: /usr/share/elasticsearch/tmp_custom
        ports:
        - containerPort: 9200
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: "2"
            memory: 2Gi
        volumeMounts:
        - name: es-data
          mountPath: /usr/share/elasticsearch/data
        - name: es-tmp
          mountPath: /usr/share/elasticsearch/tmp_custom
      volumes:
      - name: es-data
        persistentVolumeClaim:
          claimName: elasticsearch-pvc
      - name: es-tmp
        emptyDir:
          medium: Memory
          sizeLimit: 512Mi
