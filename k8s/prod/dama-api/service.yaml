# 운영 백엔드 — ClusterIP(외부는 cloudflared 터널). /actuator는 터널에서 차단(path-exclusion).
apiVersion: v1
kind: Service
metadata:
  name: dama-api
  namespace: dama-prod
  labels:
    app: dama-api
spec:
  type: ClusterIP
  selector:
    app: dama-api
  ports:
    - name: http
      port: 8080
      targetPort: 8080
