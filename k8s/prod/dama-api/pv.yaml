apiVersion: v1
kind: PersistentVolume
metadata:
  name: dama-api-meal-photos-prod-pv
spec:
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteOnce
  # 사진 데이터 보존 — PVC 삭제 시에도 볼륨을 유지(데이터 손실 방지).
  persistentVolumeReclaimPolicy: Retain
  storageClassName: local-storage
  local:
    path: /home/kimsijun/repository/resources/prod/dama-api/meal-photos
  nodeAffinity:
    required:
      nodeSelectorTerms:
      - matchExpressions:
        - key: kubernetes.io/hostname
          operator: In
          values:
          - prodesk
