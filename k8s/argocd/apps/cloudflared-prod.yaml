apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloudflared-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/sijunkim/infra.git
    targetRevision: master
    path: k8s/prod/cloudflared
  destination:
    server: https://kubernetes.default.svc
    namespace: dama-prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
