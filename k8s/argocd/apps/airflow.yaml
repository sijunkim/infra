apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: airflow
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://airflow.apache.org
      chart: airflow
      targetRevision: "1.15.*"
      helm:
        valueFiles:
          - $values/k8s/apps/airflow/values-airflow.yaml
    - repoURL: https://github.com/sijunkim/infra.git
      targetRevision: master
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: airflow
  ignoreDifferences:
    - group: ""
      kind: Secret
      name: airflow-webserver-secret-key
      jsonPointers:
        - /data
    - group: apps
      kind: Deployment
      name: airflow-webserver
      jqPathExpressions:
        - .spec.template.metadata.annotations."checksum/webserver-secret-key"
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - RespectIgnoreDifferences=true
