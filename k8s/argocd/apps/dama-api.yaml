apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dama-api
  namespace: argocd
  annotations:
    argocd-image-updater.argoproj.io/image-list: app=ghcr.io/sijunkim/dama-api
    argocd-image-updater.argoproj.io/app.update-strategy: newest-build
    argocd-image-updater.argoproj.io/app.allow-tags: regexp:^master-
    # private 패키지 — Image Updater가 태그 조회 시 ghcr-pull 자격증명 사용
    argocd-image-updater.argoproj.io/app.pull-secret: pullsecret:prodesk/ghcr-pull
    argocd-image-updater.argoproj.io/write-back-method: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/sijunkim/infra.git
    targetRevision: master
    path: k8s/apps/dama-api
  destination:
    server: https://kubernetes.default.svc
    namespace: prodesk
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
